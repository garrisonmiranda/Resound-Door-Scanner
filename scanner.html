<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FxW – Main Door Check-In</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════════
   FITNESS x WORSHIP  –  MAIN DOOR SCANNER
   Metallic Blue (#A9D1EA) + Soft Peach (#F4B8B8)
   ══════════════════════════════════════════════════════════ */
:root{
  --blue:#A9D1EA;
  --blue-dim:rgba(169,209,234,.12);
  --blue-border:rgba(169,209,234,.28);
  --peach:#F4B8B8;
  --peach-dim:rgba(244,184,184,.12);
  --green:#4ade80;
  --green-dim:rgba(74,222,128,.1);
  --red:#f87171;
  --bg:#0B0B0B;
  --surface:#1A1A1E;
  --surface2:#111113;
  --border:#252528;
  --text:#F0F0F0;
  --text-mid:rgba(240,240,240,.55);
  --text-lo:rgba(240,240,240,.28);
  --font:'Roboto Mono',monospace;
  --head:'Archivo Black',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --bounce:cubic-bezier(.22,.68,0,1.2);

  /* WEBHOOK – replace with your deployed Apps Script URL */
  --webhook-url:'';
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── TOP BAR ─────────────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:var(--surface);
  border-bottom:2px solid var(--blue);
  position:fixed;top:0;left:0;right:0;z-index:100;
}
.topbar-title{
  font-family:var(--head);font-size:.95rem;font-weight:900;
  color:var(--blue);letter-spacing:.08em;text-transform:uppercase;
}
.topbar-sub{font-size:.6rem;color:var(--text-lo);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}

.counter-badge{
  display:flex;flex-direction:column;align-items:flex-end;
  background:var(--blue-dim);border:1px solid var(--blue-border);
  padding:6px 12px;
  min-width:110px;
}
.counter-label{font-size:.55rem;color:rgba(169,209,234,.6);letter-spacing:.14em;text-transform:uppercase}
.counter-val{
  font-family:var(--head);font-size:1.3rem;font-weight:900;color:var(--blue);line-height:1;letter-spacing:.04em;
}
.counter-val span{font-size:.75rem;color:var(--text-mid);font-family:var(--font)}

/* ── TABS ────────────────────────────────────────────────── */
.tabs{
  display:flex;
  position:fixed;top:72px;left:0;right:0;z-index:99;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.tab{
  flex:1;padding:12px 0;
  font-family:var(--font);font-size:.72rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-lo);background:transparent;border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .2s var(--ease);
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--blue-dim)}

/* ── MAIN CONTENT ────────────────────────────────────────── */
.pane{
  position:fixed;top:117px;left:0;right:0;bottom:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;
}
.pane.active{display:block}

/* ── SCANNER PANE ────────────────────────────────────────── */
#pane-scanner{
  display:none;
  flex-direction:column;align-items:center;
  padding:16px 16px 80px;
  gap:14px;
}
#pane-scanner.active{display:flex}

.scan-frame{
  width:100%;max-width:340px;
  border:3px solid var(--blue);
  box-shadow:0 0 0 1px rgba(169,209,234,.15),0 0 32px rgba(169,209,234,.12);
  position:relative;overflow:hidden;
  background:#000;
}
.scan-frame::before,.scan-frame::after{
  content:'';position:absolute;width:24px;height:24px;z-index:5;pointer-events:none;
}
.scan-frame::before{top:6px;left:6px;border-top:3px solid var(--blue);border-left:3px solid var(--blue)}
.scan-frame::after{top:6px;right:6px;border-top:3px solid var(--blue);border-right:3px solid var(--blue)}
.scan-corner-bl,.scan-corner-br{
  position:absolute;width:24px;height:24px;z-index:5;pointer-events:none;
}
.scan-corner-bl{bottom:6px;left:6px;border-bottom:3px solid var(--blue);border-left:3px solid var(--blue)}
.scan-corner-br{bottom:6px;right:6px;border-bottom:3px solid var(--blue);border-right:3px solid var(--blue)}

#reader{width:100%;background:#000}
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);
  animation:scanmove 2s ease-in-out infinite;
  z-index:4;pointer-events:none;
  box-shadow:0 0 8px rgba(169,209,234,.5);
}
@keyframes scanmove{0%{top:10%}100%{top:88%}}

/* Status card */
.status-card{
  width:100%;max-width:340px;
  padding:16px 18px;
  border:2px solid var(--border);
  background:var(--surface);
  min-height:80px;
  transition:border-color .3s,background .3s;
}
.status-card.ok{border-color:var(--green);background:rgba(74,222,128,.06)}
.status-card.err{border-color:var(--peach);background:rgba(244,184,184,.06)}
.status-card.warn{border-color:#facc15;background:rgba(250,204,21,.06)}
.status-idle{color:var(--text-lo);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:8px 0}
.status-name{font-family:var(--head);font-size:1.1rem;font-weight:900;color:var(--text);margin-bottom:4px;text-transform:uppercase}
.status-email{font-size:.72rem;color:var(--text-mid);margin-bottom:8px;word-break:break-all}
.status-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
}
.status-badge.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green)}
.status-badge.err{background:rgba(244,184,184,.1);border:1px solid rgba(244,184,184,.3);color:var(--peach)}
.status-badge.warn{background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.3);color:#facc15}
.status-meta{font-size:.68rem;color:var(--text-lo);margin-top:6px;letter-spacing:.06em}

/* Cooldown overlay */
.cooldown-bar{
  width:100%;max-width:340px;
  height:3px;background:var(--border);overflow:hidden;
}
.cooldown-fill{height:100%;background:var(--blue);width:0%;transition:width .1s linear}

/* Manual scan input */
.manual-wrap{width:100%;max-width:340px;display:flex;gap:8px}
.manual-input{
  flex:1;background:var(--surface2);border:2px solid var(--border);
  padding:10px 14px;color:var(--text);font-family:var(--font);font-size:.82rem;
  outline:none;transition:border-color .2s;
}
.manual-input:focus{border-color:var(--blue)}
.manual-input::placeholder{color:var(--text-lo)}
.btn-manual{
  background:var(--blue);color:#000;border:none;
  padding:10px 16px;font-family:var(--head);font-size:.75rem;font-weight:900;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  transition:background .2s;white-space:nowrap;
}
.btn-manual:hover{background:#8ec8e6}

/* Camera toggle */
.btn-cam{
  display:flex;align-items:center;gap:8px;
  background:transparent;border:2px solid var(--blue-border);
  padding:10px 18px;color:var(--blue);
  font-family:var(--font);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.btn-cam:hover{background:var(--blue-dim);border-color:var(--blue)}
.btn-cam.active{background:var(--blue-dim);border-color:var(--blue)}

/* ── ROSTER PANE ─────────────────────────────────────────── */
#pane-roster{padding:12px 12px 80px;display:none}
#pane-roster.active{display:block}

.roster-search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:2px solid var(--border);
  padding:10px 14px;margin-bottom:12px;
  position:sticky;top:0;z-index:10;
}
.roster-search-wrap input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:var(--font);font-size:.82rem;color:var(--text);letter-spacing:.04em;
}
.roster-search-wrap input::placeholder{color:var(--text-lo)}
.roster-search-icon{font-size:1rem;color:var(--text-lo)}

.roster-stats{
  display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;
}
.roster-stat{
  flex:1;min-width:80px;
  background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--blue);
  padding:10px 12px;
  font-size:.68rem;color:var(--text-lo);letter-spacing:.08em;text-transform:uppercase;
}
.roster-stat strong{display:block;font-family:var(--head);font-size:1.1rem;color:var(--blue);margin-bottom:2px}

.roster-empty{text-align:center;padding:40px 16px;color:var(--text-lo);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase}

.attendee-row{
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--border);
  padding:12px 14px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
  transition:border-color .2s;
}
.attendee-row.checked-in{border-left-color:var(--green)}
.attendee-row.partial{border-left-color:#facc15}
.attendee-info{flex:1;min-width:0}
.attendee-name{font-family:var(--head);font-size:.88rem;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attendee-email{font-size:.65rem;color:var(--text-lo);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attendee-seats{font-size:.62rem;color:var(--text-mid);margin-top:3px;letter-spacing:.06em}
.ci-tag{
  white-space:nowrap;padding:4px 10px;
  font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid;
}
.ci-tag.full{color:var(--green);border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08)}
.ci-tag.none{color:var(--blue);border-color:var(--blue-border);background:var(--blue-dim);cursor:pointer;transition:background .2s}
.ci-tag.none:hover{background:rgba(169,209,234,.22)}
.ci-tag.partial{color:#facc15;border-color:rgba(250,204,21,.3);background:rgba(250,204,21,.08);cursor:pointer}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:2px solid var(--border);
  padding:10px 22px;font-size:.78rem;color:var(--text);white-space:nowrap;
  box-shadow:4px 4px 0 rgba(0,0,0,.5);z-index:500;
  transition:transform .3s var(--bounce),opacity .3s;opacity:0;
  font-family:var(--font);letter-spacing:.06em;text-transform:uppercase;
  max-width:calc(100vw - 32px);white-space:normal;text-align:center;
}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--peach);color:var(--peach)}
.toast.warn{border-color:#facc15;color:#facc15}

/* ── LOADER ──────────────────────────────────────────────── */
.loader{
  position:fixed;inset:0;z-index:300;background:rgba(11,11,11,.88);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.loader.on{display:flex}
.spin{width:36px;height:36px;border:3px solid rgba(169,209,234,.1);border-top-color:var(--blue);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loader-txt{font-size:.72rem;color:var(--text-lo);letter-spacing:.14em;text-transform:uppercase}

/* ── WEBHOOK CONFIG BANNER ───────────────────────────────── */
.webhook-banner{
  background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.3);
  padding:10px 14px;margin:0 0 12px;
  font-size:.68rem;color:#facc15;letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.webhook-input{
  width:100%;background:var(--surface2);border:2px solid var(--border);
  padding:10px 14px;color:var(--text);font-family:var(--font);font-size:.78rem;
  outline:none;margin-bottom:10px;
  transition:border-color .2s;
}
.webhook-input:focus{border-color:var(--blue)}
.btn-set{
  background:var(--blue);color:#000;border:none;
  padding:10px 20px;font-family:var(--head);font-size:.78rem;font-weight:900;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%;
  transition:background .2s;
}
.btn-set:hover{background:#8ec8e6}
.settings-section{padding:14px 14px 0;border-top:1px solid var(--border)}
.settings-label{font-size:.6rem;color:var(--text-lo);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">🚪 Main Door</div>
    <div class="topbar-sub">FITNESS x WORSHIP · Check-In</div>
  </div>
  <div class="counter-badge">
    <div class="counter-label">Tribe</div>
    <div class="counter-val" id="counter-val">–&nbsp;<span>/ 100</span></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-scanner" onclick="switchTab('scanner')">📷 Scanner</button>
  <button class="tab" id="tab-roster" onclick="switchTab('roster')">📋 Roster</button>
  <button class="tab" id="tab-settings" onclick="switchTab('settings')">⚙️ Setup</button>
</div>

<!-- SCANNER PANE -->
<div class="pane active" id="pane-scanner">
  <div class="scan-frame" id="scan-frame">
    <div id="reader"></div>
    <div class="scan-line" id="scan-line"></div>
    <div class="scan-corner-bl"></div>
    <div class="scan-corner-br"></div>
  </div>
  <div class="cooldown-bar"><div class="cooldown-fill" id="cooldown-fill"></div></div>
  <div class="status-card" id="status-card">
    <div class="status-idle">Point camera at attendee's QR code</div>
  </div>
  <div class="manual-wrap">
    <input class="manual-input" type="email" id="manual-email" placeholder="Or type email & press →" autocomplete="off" autocapitalize="off">
    <button class="btn-manual" onclick="manualCheckIn()">→</button>
  </div>
  <button class="btn-cam" id="btn-cam" onclick="toggleCamera()">📷 Start Camera</button>
</div>

<!-- ROSTER PANE -->
<div class="pane" id="pane-roster">
  <div class="roster-search-wrap">
    <span class="roster-search-icon">🔍</span>
    <input type="search" id="roster-search" placeholder="Search by name or email…" oninput="filterRoster()" autocomplete="off" autocapitalize="off">
  </div>
  <div class="roster-stats">
    <div class="roster-stat"><strong id="stat-total">–</strong>Registered</div>
    <div class="roster-stat"><strong id="stat-checked">–</strong>Checked In</div>
    <div class="roster-stat"><strong id="stat-pending">–</strong>Pending</div>
  </div>
  <div id="roster-list"></div>
</div>

<!-- SETTINGS PANE -->
<div class="pane" id="pane-settings">
  <div style="padding:14px">
    <div class="settings-label">Webhook URL (Google Apps Script doPost)</div>
    <input class="webhook-input" type="url" id="webhook-url-input" placeholder="https://script.google.com/macros/s/…/exec">
    <button class="btn-set" onclick="saveWebhook()">Save & Test Connection</button>
    <div id="webhook-status" style="margin-top:10px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-lo)"></div>
  </div>
</div>

<!-- TOAST + LOADER -->
<div class="toast" id="toast"></div>
<div class="loader" id="loader"><div class="spin"></div><div class="loader-txt" id="loader-txt">Processing…</div></div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
   ══════════════════════════════════════════════════════════ */
var WEBHOOK_URL = localStorage.getItem('fxw_webhook') || '';
var TOTAL_SEATS = 100;
var COOLDOWN_MS = 2000;
var rosterData  = [];       // full roster from server
var scanCooldown = false;
var cameraRunning = false;
var html5QrCode   = null;
var _toastTimer   = null;
var _cooldownTimer = null;
var _pollTimer     = null;

/* ══════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('fxw_webhook');
  if (saved) {
    document.getElementById('webhook-url-input').value = saved;
    WEBHOOK_URL = saved;
    loadRoster();
    _pollTimer = setInterval(loadRoster, 30000);
  } else {
    switchTab('settings');
    toast('Set your webhook URL first', 'warn');
  }
});

/* ══════════════════════════════════════════════════════════
   TAB SWITCHING
   ══════════════════════════════════════════════════════════ */
function switchTab(name) {
  ['scanner','roster','settings'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('pane-'+t).classList.toggle('active', t===name);
  });
  if (name === 'roster') filterRoster();
  if (name !== 'scanner' && cameraRunning) {
    stopCamera();
  }
}

/* ══════════════════════════════════════════════════════════
   CAMERA
   ══════════════════════════════════════════════════════════ */
function toggleCamera() {
  if (cameraRunning) stopCamera();
  else startCamera();
}

function startCamera() {
  var btn = document.getElementById('btn-cam');
  html5QrCode = new Html5Qrcode('reader');
  Html5Qrcode.getCameras().then(function(devices) {
    if (!devices || devices.length === 0) { toast('No camera found', 'err'); return; }
    // prefer back camera
    var cam = devices.find(function(d) { return /back|rear|environment/i.test(d.label); }) || devices[devices.length - 1];
    html5QrCode.start(
      cam.id,
      { fps: 10, qrbox: { width: 240, height: 240 } },
      function(decodedText) { onScanResult(decodedText); },
      function() {}
    ).then(function() {
      cameraRunning = true;
      btn.textContent = '⏹ Stop Camera';
      btn.classList.add('active');
      document.getElementById('scan-line').style.display = 'block';
    }).catch(function(err) {
      toast('Camera error: ' + err, 'err');
    });
  }).catch(function(err) {
    toast('Camera access denied', 'err');
  });
}

function stopCamera() {
  if (html5QrCode) {
    html5QrCode.stop().then(function() {
      cameraRunning = false;
      document.getElementById('btn-cam').textContent = '📷 Start Camera';
      document.getElementById('btn-cam').classList.remove('active');
      document.getElementById('scan-line').style.display = 'none';
    }).catch(function(){});
  }
}

/* ══════════════════════════════════════════════════════════
   QR SCAN HANDLER
   ══════════════════════════════════════════════════════════ */
function onScanResult(rawText) {
  if (scanCooldown) return;
  var email = rawText.trim().toLowerCase();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    toast('Invalid QR – not an email', 'err');
    return;
  }
  startCooldown();
  processCheckIn(email);
}

function startCooldown() {
  scanCooldown = true;
  var fill = document.getElementById('cooldown-fill');
  var start = Date.now();
  fill.style.width = '100%';
  clearInterval(_cooldownTimer);
  _cooldownTimer = setInterval(function() {
    var elapsed = Date.now() - start;
    var pct = Math.max(0, 100 - (elapsed / COOLDOWN_MS * 100));
    fill.style.width = pct + '%';
    if (elapsed >= COOLDOWN_MS) {
      scanCooldown = false;
      fill.style.width = '0%';
      clearInterval(_cooldownTimer);
    }
  }, 50);
}

/* ══════════════════════════════════════════════════════════
   MANUAL CHECK-IN
   ══════════════════════════════════════════════════════════ */
function manualCheckIn() {
  var email = document.getElementById('manual-email').value.trim().toLowerCase();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    toast('Enter a valid email', 'err'); return;
  }
  processCheckIn(email);
  document.getElementById('manual-email').value = '';
}
document.getElementById('manual-email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') manualCheckIn();
});

/* ══════════════════════════════════════════════════════════
   CHECK-IN LOGIC  –  with Group Pass prompt
   ══════════════════════════════════════════════════════════ */
function processCheckIn(email) {
  if (!WEBHOOK_URL) { toast('No webhook URL configured', 'err'); return; }

  // Find attendee in local roster for group info
  var attendee = rosterData.find(function(a) { return a.email === email; });

  if (!attendee) {
    // Try fetching live anyway
    sendCheckIn(email, 1);
    return;
  }

  var remaining = attendee.totalSeats - attendee.checkedIn;
  if (remaining <= 0) {
    setStatusCard({
      type: 'warn',
      name: attendee.name,
      email: email,
      badge: 'ALREADY FULLY CHECKED IN',
      badgeType: 'warn',
      meta: 'All ' + attendee.totalSeats + ' seat(s) scanned.'
    });
    return;
  }

  // Group pass – ask quantity if more than 1 remaining
  var qty = 1;
  if (remaining > 1) {
    var answer = prompt(
      'Group Pass\n\n' + attendee.name + ' has ' + remaining + ' seat(s) remaining.\n\nHow many are checking in right now?',
      remaining
    );
    if (answer === null) return; // cancelled
    qty = parseInt(answer);
    if (isNaN(qty) || qty < 1) { toast('Invalid quantity', 'err'); return; }
    if (qty > remaining) { toast('Entered more than remaining seats (' + remaining + ')', 'err'); return; }
  }

  sendCheckIn(email, qty);
}

function sendCheckIn(email, quantity) {
  setLoading(true, 'Checking in…');
  apiPost({ action: 'checkIn', email: email, quantity: quantity }, function(res) {
    setLoading(false);
    if (res.success) {
      setStatusCard({
        type: 'ok',
        name: res.name || email,
        email: email,
        badge: 'CHECKED IN  ' + res.checkedIn + ' / ' + res.totalSeats,
        badgeType: 'ok',
        meta: res.checkedIn < res.totalSeats
          ? (res.totalSeats - res.checkedIn) + ' seat(s) still to check in'
          : 'Full group checked in ✓'
      });
      toast('✓ ' + (res.name || email), 'ok');
      loadRoster();
    } else {
      setStatusCard({
        type: 'err',
        name: email,
        email: '',
        badge: 'REJECTED',
        badgeType: 'err',
        meta: res.error || 'Check-in failed'
      });
      toast(res.error || 'Check-in failed', 'err');
    }
  });
}

/* ══════════════════════════════════════════════════════════
   STATUS CARD
   ══════════════════════════════════════════════════════════ */
function setStatusCard(opts) {
  var card = document.getElementById('status-card');
  card.className = 'status-card ' + (opts.type || '');
  card.innerHTML =
    '<div class="status-name">' + esc(opts.name) + '</div>' +
    (opts.email ? '<div class="status-email">' + esc(opts.email) + '</div>' : '') +
    '<span class="status-badge ' + (opts.badgeType||'') + '">' + esc(opts.badge) + '</span>' +
    (opts.meta ? '<div class="status-meta">' + esc(opts.meta) + '</div>' : '');
}

/* ══════════════════════════════════════════════════════════
   ROSTER
   ══════════════════════════════════════════════════════════ */
function loadRoster() {
  if (!WEBHOOK_URL) return;
  apiPost({ action: 'getRoster' }, function(res) {
    if (!res.success) return;
    rosterData = res.roster || [];
    updateCounter(res.totalCheckedIn, TOTAL_SEATS);
    updateStats(res);
    filterRoster();
  });
}

function updateCounter(checkedIn, total) {
  var el = document.getElementById('counter-val');
  el.innerHTML = (checkedIn !== undefined ? checkedIn : '–') + '&nbsp;<span>/ ' + total + '</span>';
}

function updateStats(res) {
  var total   = rosterData.length;
  var checked = rosterData.filter(function(a) { return a.checkedIn >= a.totalSeats; }).length;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-checked').textContent = res.totalCheckedIn !== undefined ? res.totalCheckedIn : '–';
  document.getElementById('stat-pending').textContent = Math.max(0, total - checked);
}

function filterRoster() {
  var q = (document.getElementById('roster-search').value || '').toLowerCase().trim();
  var filtered = q
    ? rosterData.filter(function(a) {
        return a.name.toLowerCase().indexOf(q) >= 0 || a.email.toLowerCase().indexOf(q) >= 0;
      })
    : rosterData;
  renderRoster(filtered);
}

function renderRoster(list) {
  var el = document.getElementById('roster-list');
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="roster-empty">' + (rosterData.length === 0 ? 'No data loaded yet' : 'No results') + '</div>';
    return;
  }
  // Sort: not-checked-in first
  list = list.slice().sort(function(a,b) {
    var aPct = a.checkedIn / a.totalSeats;
    var bPct = b.checkedIn / b.totalSeats;
    return aPct - bPct;
  });
  el.innerHTML = list.map(function(a) {
    var isFull    = a.checkedIn >= a.totalSeats;
    var isPartial = a.checkedIn > 0 && a.checkedIn < a.totalSeats;
    var rowClass  = isFull ? 'attendee-row checked-in' : isPartial ? 'attendee-row partial' : 'attendee-row';
    var tagClass  = isFull ? 'ci-tag full' : isPartial ? 'ci-tag partial' : 'ci-tag none';
    var tagText   = isFull
      ? 'CHECKED IN'
      : isPartial
        ? a.checkedIn + '/' + a.totalSeats + ' — TAP'
        : 'CHECK IN';
    var onclick   = isFull ? '' : 'onclick="rosterCheckIn(\'' + escAttr(a.email) + '\')"';
    return '<div class="' + rowClass + '">'
      + '<div class="attendee-info">'
        + '<div class="attendee-name">' + esc(a.name) + '</div>'
        + '<div class="attendee-email">' + esc(a.email) + '</div>'
        + '<div class="attendee-seats">Seats: ' + a.totalSeats + (a.totalSeats > 1 ? ' · Group pass' : '') + '</div>'
      + '</div>'
      + '<span class="' + tagClass + '" ' + onclick + '>' + tagText + '</span>'
      + '</div>';
  }).join('');
}

function rosterCheckIn(email) {
  switchTab('scanner');
  processCheckIn(email);
}

/* ══════════════════════════════════════════════════════════
   WEBHOOK SETTINGS
   ══════════════════════════════════════════════════════════ */
function saveWebhook() {
  var url = document.getElementById('webhook-url-input').value.trim();
  if (!url) { toast('Enter a URL', 'err'); return; }
  WEBHOOK_URL = url;
  localStorage.setItem('fxw_webhook', url);
  document.getElementById('webhook-status').textContent = 'Testing…';
  apiPost({ action: 'getRoster' }, function(res) {
    if (res.success) {
      document.getElementById('webhook-status').style.color = 'var(--green)';
      document.getElementById('webhook-status').textContent = '✓ Connected — ' + (res.roster || []).length + ' attendee(s) found';
      toast('Webhook connected!', 'ok');
      rosterData = res.roster || [];
      updateCounter(res.totalCheckedIn, TOTAL_SEATS);
      filterRoster();
      if (!_pollTimer) _pollTimer = setInterval(loadRoster, 30000);
    } else {
      document.getElementById('webhook-status').style.color = 'var(--peach)';
      document.getElementById('webhook-status').textContent = '✗ ' + (res.error || 'Connection failed');
      toast('Connection failed', 'err');
    }
  });
}

/* ══════════════════════════════════════════════════════════
   API
   ══════════════════════════════════════════════════════════ */
function apiPost(body, cb) {
  fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    mode: 'cors'
  })
  .then(function(r) { return r.json(); })
  .then(function(data) { cb(data); })
  .catch(function(err) {
    setLoading(false);
    toast('Network error: ' + err, 'err');
    cb({ success: false, error: err.toString() });
  });
}

/* ══════════════════════════════════════════════════════════
   UI HELPERS
   ══════════════════════════════════════════════════════════ */
function setLoading(on, msg) {
  var el = document.getElementById('loader');
  if (on) {
    document.getElementById('loader-txt').textContent = msg || 'Processing…';
    el.classList.add('on');
  } else {
    el.classList.remove('on');
  }
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  t.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('on'); }, 3200);
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
</script>
